{% comment %}
  Fragment do corpo do modal de devolução (TR-020).
  Params: form, item, entregue_liquida, requisicao, id, erro
{% endcomment %}

<div class="space-y-4">
  <p class="text-sm text-slate-700">
    Material: <span class="font-semibold">{{ item.material.nome }}</span><br>
    Entregue líquida disponível:
    <span class="font-semibold tabular-nums">{{ entregue_liquida }}</span>
    {{ item.material.unidade }}
  </p>

  <div>
    <label for="modal-devolver-quantidade-{{ item.pk }}"
           class="block text-sm font-medium text-slate-900">
      Quantidade devolvida <span aria-hidden="true" class="text-red-600">*</span>
    </label>
    <input
      type="number"
      id="modal-devolver-quantidade-{{ item.pk }}"
      name="quantidade"
      step="0.001"
      min="0.001"
      value="{{ form.quantidade.value|default_if_none:'' }}"
      required
      aria-required="true"
      {% if erro %}aria-invalid="true"{% endif %}
      aria-describedby="{% if erro %}{{ id }}-erro{% endif %}"
      class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-1"
    >
  </div>

  <div>
    <label for="modal-devolver-observacao-{{ item.pk }}"
           class="block text-sm font-medium text-slate-900">
      Observação
    </label>
    <textarea
      id="modal-devolver-observacao-{{ item.pk }}"
      name="observacao"
      rows="2"
      class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-1"
      placeholder="Opcional"
    >{{ form.observacao.value|default_if_none:"" }}</textarea>
  </div>
</div>
